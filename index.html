<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mashine XHR JSON PLACEHOLDER</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bgColor">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3 mb-4">
                <h1 class="text-center"> ADD NEW POST</h1>
                <div class="card">
                    <div class="card-body">
                        <form id="postForm">
                            <div class="form-group">
                                <label for="title">Title</label>
                                <input type="text" class="form-control" id="title">
                            </div>
                            <div class="form-group">
                                <label for="body">Content</label>
                                <textarea rows="4" class="form-control" id="body"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="userId">User Id</label>
                                <select class="form-control" id="userId">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>

                            <button id="addPostBtn" class="btn btn-sm btn-block btn-primary">
                                Add Post
                            </button>

                            <button type="button" id="updatePostBtn" class="btn btn-sm btn-block btn-primary d-none">
                                Update Post
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
        <div class="row" id="postContainer">
            <div class="col-md-4" id="123">
                <div class="card">
                    <div class="card-header">
                        <h3  id="Title">
                            Title
                        </h3>
                    </div>
                    <div class="card-body">
                        <p class="m-0">
                            Lorem ipsum dolor sit amet consectetur adipisicing elit. Omnis recusandae impedit
                            consequuntur saepe tempora corporis, quaerat nobis veniam sit quia eligendi nesciunt sunt
                            velit maiores nostrum unde. Earum, soluta sapiente!
                        </p>
                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <button class="btn btn-sm btn-outline-primary">Edit</button>
                        <button class="btn btn-sm btn-outline-danger">Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="spinner d-none" id="spinner">
        <div class="spinner-border" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <script src="app.js"></script>
</body>


</html>
